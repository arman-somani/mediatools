<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>MediaTools WASM</title>
  <style>
    body { width: 320px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: #0f172a; color: white; padding: 16px; margin: 0; }
    h2 { text-align: center; margin-top: 0; color: #2dd4bf; }
    .url-box { background: rgba(255, 255, 255, 0.05); border-radius: 8px; padding: 10px; margin-bottom: 15px; font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    button { width: 100%; padding: 12px; margin-bottom: 10px; background: linear-gradient(135deg, #2dd4bf 0%, #0284c7 100%); border: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: white; transition: opacity 0.2s; }
    button:hover { opacity: 0.9; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .status { margin-top: 15px; font-size: 12px; text-align: center; color: #94a3b8; padding: 10px; background: rgba(255,255,255,0.05); border-radius: 6px; display: none; }
  </style>
</head>
<body>
  <h2>MediaTools WASM</h2>
  <div class="url-box" id="url">Checking URL...</div>
  <button id="btn-download" disabled>Download 1080p (Merge)</button>
  <div class="status" id="status"></div>
  <script src="popup.bundle.js"></script>
</body>
</html>
